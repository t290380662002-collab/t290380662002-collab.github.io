name: Telegram Bot 定時檢查

on:
  schedule:
    - cron: '*/5 * * * *'     # 每 5 分鐘檢查新訊息
  workflow_dispatch:
  push:
    branches: [main]          # 推送上線後立即檢查一次

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Telegram Bot（單次檢查模式）
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        run: python tg_bot.py
