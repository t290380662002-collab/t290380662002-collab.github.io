name: Telegram Bot 即時輪詢

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小時重啟一次（GitHub Actions 上限）
  workflow_dispatch:

concurrency:
  group: tg-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360     # 6 小時上限
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Telegram Bot (Long Polling)
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          LONGPOLL: "1"
        run: python tg_bot.py
